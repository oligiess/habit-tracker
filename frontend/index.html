<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Habits</h1>
        <p class="sub">one step at a time</p>
      </div>
      <div class="today" id="today"></div>
    </header>
    <p id="status" class="status-line">Loading...</p>

    <form id="add-habit-form" class="add-panel">
      <input type="text" id="habit-name-input" placeholder="Add a new habit — e.g. Stretch before bed" required maxlength="100" />
      <button type="submit" class="add-btn">Add</button>
    </form>

    <ul id="habit-list" class="grid"></ul>
  </div>

  <button class="theme-toggle" id="theme-toggle">Toggle theme</button>

  <script src="js/app.js"></script>
</body>
</html>
