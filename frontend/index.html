<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Habit Tracker</title>
</head>
<body>
  <h1>Habit Tracker</h1>

  <ul id="habit-list"></ul>

  <script src="js/app.js"></script>
</body>
</html>
